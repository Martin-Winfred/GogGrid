name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      
      - name: Build binaries
        run: |
          mkdir -p build
          
          GOOS=linux GOARCH=amd64 go build -o build/goggrid-linux-amd64 ./cmd/goggrid
          
          GOOS=darwin GOARCH=amd64 go build -o build/goggrid-darwin-amd64 ./cmd/goggrid
          
          GOOS=darwin GOARCH=arm64 go build -o build/goggrid-darwin-arm64 ./cmd/goggrid
          
          GOOS=windows GOARCH=amd64 go build -o build/goggrid-windows-amd64.exe ./cmd/goggrid
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/*
          draft: false
          prerelease: false
          body: |
            Release ${{ github.ref }}
            
            Available downloads:
            - Linux: goggrid-linux-amd64
            - macOS Intel: goggrid-darwin-amd64
            - macOS Apple Silicon: goggrid-darwin-arm64
            - Windows: goggrid-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
