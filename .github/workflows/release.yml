name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          mkdir -p build

          for target in \
            "linux amd64" \
            "darwin amd64" \
            "darwin arm64" \
            "windows amd64"
          do
            set -- $target

            ext=""
            [ "$1" = windows ] && ext=".exe"

            GOOS=$1 GOARCH=$2 \
            go build \
              -trimpath \
              -ldflags="-s -w" \
              -o build/goggrid-$1-$2$ext \
              ./cmd/GogGrid
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: build/*
