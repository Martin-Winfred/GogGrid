name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p build

          GOOS=linux GOARCH=amd64 \
          go build -o build/goggrid-linux-amd64 ./cmd/GogGrid

          GOOS=darwin GOARCH=amd64 \
          go build -o build/goggrid-darwin-amd64 ./cmd/GogGrid

          GOOS=darwin GOARCH=arm64 \
          go build -o build/goggrid-darwin-arm64 ./cmd/GogGrid

          GOOS=windows GOARCH=amd64 \
          go build -o build/goggrid-windows-amd64.exe ./cmd/GogGrid

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}