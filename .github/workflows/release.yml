name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build binaries
        run: |
          mkdir -p build

          GOOS=linux GOARCH=amd64 \
          go build -trimpath -ldflags="-s -w" \
          -o build/goggrid-linux-amd64 ./cmd/goggrid

          GOOS=darwin GOARCH=amd64 \
          go build -trimpath -ldflags="-s -w" \
          -o build/goggrid-darwin-amd64 ./cmd/goggrid

          GOOS=darwin GOARCH=arm64 \
          go build -trimpath -ldflags="-s -w" \
          -o build/goggrid-darwin-arm64 ./cmd/goggrid

          GOOS=windows GOARCH=amd64 \
          go build -trimpath -ldflags="-s -w" \
          -o build/goggrid-windows-amd64.exe ./cmd/goggrid

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
